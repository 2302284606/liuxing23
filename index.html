<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>割草机游戏</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #2196F3;
        overflow: hidden;
      }
      
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      
      /* UI 根容器 */
      #ui-root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
      }
      
      /* 左上角状态栏 */
      #status-bar {
        position: absolute;
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
      }
      
      /* 生命值条 */
      .health-bar {
        width: 200px;
        height: 20px;
        background-color: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        overflow: hidden;
        pointer-events: none;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      .health-fill {
        width: 100%;
        height: 100%;
        background-color: #ff4444;
        transition: width 0.3s ease;
      }
      
      /* 能量条 */
      .energy-bar {
        width: 200px;
        height: 15px;
        background-color: rgba(255, 255, 255, 0.05);
        border-radius: 7.5px;
        overflow: hidden;
        pointer-events: none;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      .energy-fill {
        width: 100%;
        height: 100%;
        background-color: #4444ff;
        transition: width 0.3s ease, background-color 0.3s ease;
      }
      
      .energy-fill.overheat {
        background-color: #ff4444;
      }
      
      /* 右上角信息 */
      #info-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        pointer-events: none;
        background-color: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px;
        color: white;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }
      
      /* 右下角设置按钮 */
      #settings-button {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 24px;
        cursor: pointer;
        pointer-events: auto;
        transition: transform 0.2s ease, background-color 0.2s ease;
        backdrop-filter: blur(15px);
      }
      
      #settings-button:hover {
        transform: scale(1.1);
        background-color: rgba(255, 255, 255, 0.1);
      }
      
      /* 设置面板 */
      #settings-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        padding: 25px;
        color: white;
        font-family: Arial, sans-serif;
        min-width: 300px;
        max-width: 400px;
        display: none;
        flex-direction: column;
        gap: 20px;
        pointer-events: auto;
        z-index: 10000;
      }
      
      #settings-panel h3 {
        margin: 0 0 10px 0;
        color: #ffffff;
        font-size: 18px;
        text-align: center;
      }
      
      #settings-panel .setting-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      
      #settings-panel .setting-group label {
        font-size: 14px;
        color: #ffffff;
      }
      
      #settings-panel .setting-group input[type="range"] {
        width: 100%;
        cursor: pointer;
      }
      
      #settings-panel .button-group {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      
      #settings-panel button {
        flex: 1;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        background-color: rgba(255, 255, 255, 0.05);
        color: white;
        cursor: pointer;
        transition: background-color 0.2s ease;
        pointer-events: auto;
      }
      
      #settings-panel button:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
      
      /* 背景遮罩 */
      #settings-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
        pointer-events: auto;
        z-index: 9998;
      }
      
      /* 动态摇杆不需要固定容器样式 */
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="joystick"></div>
    </div>
    
    <!-- UI 根容器 -->
    <div id="ui-root">
      <!-- 左上角状态栏 -->
      <div id="status-bar">
        <div class="health-bar">
          <div class="health-fill"></div>
        </div>
        <div class="energy-bar">
          <div class="energy-fill"></div>
        </div>
      </div>
      
      <!-- 右上角信息面板 -->
      <div id="info-panel">
        <div id="fps">FPS: 60</div>
        <div id="enemy-count">敌人: 0</div>
      </div>
      
      <!-- 右下角设置按钮 -->
      <button id="settings-button">⚙️</button>
      
      <!-- 设置面板遮罩 -->
      <div id="settings-overlay"></div>
      
      <!-- 设置面板 -->
      <div id="settings-panel">
        <h3>游戏设置</h3>
        
        <div class="setting-group">
          <label for="volume">音量</label>
          <input type="range" id="volume" min="0" max="100" value="100">
        </div>
        
        <div class="button-group">
          <button id="restart-button">重新开始</button>
          <button id="close-settings">关闭</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
